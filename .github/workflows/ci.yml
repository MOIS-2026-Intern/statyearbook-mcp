name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    env:
      STATYEARBOOK_DSN: postgresql://postgres:postgres@127.0.0.1:5432/statyearbook
      OPENAI_API_KEY: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

  migration-test:
    name: Database migration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: statyearbook
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d statyearbook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply initial migration
        run: >-
          psql
          -h 127.0.0.1
          -U postgres
          -d statyearbook
          -v ON_ERROR_STOP=1
          -f supabase/migrations/202607140001_initial_schema.sql

      - name: Verify pgvector extension
        run: |
          result="$(psql -h 127.0.0.1 -U postgres -d statyearbook -Atc \
            "SELECT extname FROM pg_extension WHERE extname = 'vector';")"
          test "$result" = "vector"

      - name: Verify tables
        run: |
          result="$(psql -h 127.0.0.1 -U postgres -d statyearbook -Atc \
            "SELECT COUNT(*)
             FROM pg_tables
             WHERE schemaname = 'public'
               AND tablename IN (
                 'publications',
                 'statistics',
                 'stat_tables',
                 'footnotes',
                 'contacts',
                 'statistic_images'
               );")"
          test "$result" = "6"

  docker-build:
    name: Docker build and health check
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build
      - migration-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t mois-statyearbook-service:ci .

      - name: Start container
        run: |
          docker run --detach \
            --name statyearbook-ci \
            --publish 127.0.0.1:10000:10000 \
            --env PORT=10000 \
            mois-statyearbook-service:ci

      - name: Wait for health check
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:10000/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs statyearbook-ci
          exit 1

      - name: Show container logs
        if: always()
        run: docker logs statyearbook-ci || true

      - name: Stop container
        if: always()
        run: docker rm --force statyearbook-ci || true