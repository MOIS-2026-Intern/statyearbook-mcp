name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    # main 브랜치 보호 규칙이 사용하는 기존 required check 이름을 유지한다.
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      APP_PROFILE: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            admin/requirements.txt
            app/requirements.txt
            backend/requirements.txt

      - name: Install service dependencies
        run: >-
          python -m pip install
          -r admin/requirements.txt
          -r app/requirements.txt
          -r backend/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build:test

  db-test:
    name: Database migration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: statyearbook_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d statyearbook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Apply canonical schema twice
        run: |
          psql -h 127.0.0.1 -U postgres -d statyearbook_test \
            -v ON_ERROR_STOP=1 -f db/schema.sql
          psql -h 127.0.0.1 -U postgres -d statyearbook_test \
            -v ON_ERROR_STOP=1 -f db/schema.sql

      - name: Verify pgvector and tables
        run: |
          test "$(psql -h 127.0.0.1 -U postgres -d statyearbook_test -Atc \
            "SELECT extname FROM pg_extension WHERE extname = 'vector';")" = "vector"
          test "$(psql -h 127.0.0.1 -U postgres -d statyearbook_test -Atc \
            "SELECT COUNT(*) FROM pg_tables WHERE schemaname = 'public' AND tablename IN (
              'publications', 'embedding_profiles', 'statistics', 'stat_tables',
              'table_search_chunks', 'footnotes', 'contacts', 'embedding_jobs'
            );")" = "8"

  image-build:
    name: ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: [python-test, frontend-build, db-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin
            context: .
            dockerfile: admin/Dockerfile
            build_args: ""
          - service: app
            context: .
            dockerfile: app/Dockerfile
            build_args: ""
          - service: backend
            context: .
            dockerfile: backend/Dockerfile
            build_args: ""
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build_args: "--build-arg VITE_BACKEND_BASE_URL=https://backend.example.test"
          - service: db
            context: db
            dockerfile: db/Dockerfile
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Build isolated service image
        run: >-
          docker build
          ${{ matrix.build_args }}
          --file ${{ matrix.dockerfile }}
          --tag statyearbook-${{ matrix.service }}:ci
          ${{ matrix.context }}

      - name: Build app image for backend contract
        if: matrix.service == 'backend'
        run: >-
          docker build
          --file app/Dockerfile
          --tag statyearbook-app-contract:ci
          .

      - name: Smoke test app image
        if: matrix.service == 'app'
        run: |
          docker run --detach --name statyearbook-app-ci --publish 18001:8001 \
            --env APP_PROFILE=test \
            --env STATYEARBOOK_APP_HOST=0.0.0.0 \
            statyearbook-app:ci
          if ! curl --fail --silent --show-error --retry 20 --retry-delay 1 \
            --retry-all-errors http://127.0.0.1:18001/health; then
            docker logs statyearbook-app-ci
            exit 1
          fi

      - name: Smoke test backend image
        if: matrix.service == 'backend'
        run: |
          docker network create statyearbook-contract-ci
          docker run --detach --name statyearbook-app-contract-ci \
            --network statyearbook-contract-ci \
            --publish 18002:8001 \
            --env APP_PROFILE=test \
            --env STATYEARBOOK_APP_HOST=0.0.0.0 \
            statyearbook-app-contract:ci
          docker run --detach --name statyearbook-backend-ci --publish 18000:8000 \
            --network statyearbook-contract-ci \
            --env APP_PROFILE=test \
            --env STATYEARBOOK_BACKEND_HOST=0.0.0.0 \
            --env STATYEARBOOK_BACKEND_MCP_URL=http://statyearbook-app-contract-ci:8001/mcp \
            statyearbook-backend:ci
          if ! curl --fail --silent --show-error --retry 20 --retry-delay 1 \
            --retry-all-errors http://127.0.0.1:18002/health; then
            docker logs statyearbook-app-contract-ci
            exit 1
          fi
          if ! curl --fail --silent --show-error --retry 20 --retry-delay 1 \
            --retry-all-errors http://127.0.0.1:18000/health; then
            docker logs statyearbook-backend-ci
            exit 1
          fi
          docker exec --interactive statyearbook-backend-ci python - <<'PY'
          import asyncio

          from backend.config import settings
          from backend.gateways.mcp_gateway import McpGateway


          # 분리 배포된 app에서 backend가 세 가지 공개 도구를 실제로 조회하는지 확인한다.
          async def check_tools() -> None:
              async with McpGateway(settings) as gateway:
                  names = {tool.name for tool in await gateway.list_tool_specs()}
              expected = {"search_statistics", "search_tables", "visualize"}
              missing = expected - names
              if missing:
                  raise RuntimeError(f"missing MCP tools: {sorted(missing)}")


          asyncio.run(check_tools())
          PY

      - name: Smoke test admin image
        if: matrix.service == 'admin'
        run: |
          docker run --detach --name statyearbook-admin-ci --publish 18100:8100 \
            --env APP_PROFILE=test \
            --env STATYEARBOOK_ADMIN_HOST=0.0.0.0 \
            --env STATYEARBOOK_ADMIN_API_TOKEN=ci-token \
            statyearbook-admin:ci
          if ! curl --fail --silent --show-error --retry 20 --retry-delay 1 \
            --retry-all-errors --header 'X-Admin-Token: ci-token' \
            http://127.0.0.1:18100/api/admin/health; then
            docker logs statyearbook-admin-ci
            exit 1
          fi

      - name: Smoke test frontend image
        if: matrix.service == 'frontend'
        run: |
          docker run --detach --name statyearbook-frontend-ci --publish 18080:8080 \
            statyearbook-frontend:ci
          if ! curl --fail --silent --show-error --retry 20 --retry-delay 1 \
            --retry-all-errors http://127.0.0.1:18080/health; then
            docker logs statyearbook-frontend-ci
            exit 1
          fi

      - name: Smoke test db image
        if: matrix.service == 'db'
        run: |
          docker run --detach --name statyearbook-db-ci \
            --env APP_PROFILE=test \
            statyearbook-db:ci
          for attempt in {1..30}; do
            if docker exec statyearbook-db-ci \
              pg_isready -U postgres -d statyearbook_test; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs statyearbook-db-ci
              exit 1
            fi
            sleep 1
          done
          test "$(docker exec statyearbook-db-ci \
            psql -U postgres -d statyearbook_test -Atc \
            "SELECT to_regclass('public.statistics');")" = "statistics"

      - name: Remove smoke test container
        if: always()
        run: >-
          docker rm --force
          statyearbook-${{ matrix.service }}-ci
          2>/dev/null || true

      - name: Remove backend contract resources
        if: always() && matrix.service == 'backend'
        run: |
          docker rm --force statyearbook-app-contract-ci 2>/dev/null || true
          docker network rm statyearbook-contract-ci 2>/dev/null || true

  # 서비스별 이미지 검사를 하나의 안정적인 required check로 집계한다.
  # matrix 항목이 추가되거나 이름이 바뀌어도 브랜치 보호 규칙은 그대로 유지할 수 있다.
  docker-build-gate:
    name: Docker build and health check
    runs-on: ubuntu-latest
    needs: [image-build]
    if: always()

    steps:
      - name: Verify all image builds succeeded
        env:
          IMAGE_BUILD_RESULT: ${{ needs.image-build.result }}
        run: test "$IMAGE_BUILD_RESULT" = "success"
